# ZSH configuration knobs

[knob.HISTFILE]
name = "HISTFILE"
description = "Path to the ZSH history file"
default = "~/.zsh_history"
example = "export HISTFILE=~/.zsh_history"

[knob.HISTSIZE]
name = "HISTSIZE"
description = "Maximum number of history events to save in memory"
default = "10000"
example = "export HISTSIZE=50000"

[knob.SHARE_HISTORY]
name = "SHARE_HISTORY"
description = "Share history between all ZSH sessions (uses inc_append)"
default = "unset"
example = "setopt SHARE_HISTORY"

[knob.APPEND_HISTORY]
name = "APPEND_HISTORY"
description = "Append to history file instead of overwriting"
default = "set"
example = "setopt APPEND_HISTORY"

[knob.HIST_IGNORE_SPACE]
name = "HIST_IGNORE_SPACE"
description = "Don't enter commands starting with a space into history"
default = "unset"
example = "setopt HIST_IGNORE_SPACE"

[knob.HIST_EXPIRE_DUPS_FIRST]
name = "HIST_EXPIRE_DUPS_FIRST"
description = "Expire duplicate entries first when trimming history"
default = "unset"
example = "setopt HIST_EXPIRE_DUPS_FIRST"
